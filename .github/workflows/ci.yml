name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test
      - name: Build Android APK
        run: flutter build apk --debug

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Test on Windows
        run: flutter test
      - name: Build Windows
        run: flutter build windows --release
      - name: Create portable archive
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath rubrica-associati-windows-x64.zip
      - name: Create Microsoft Store package
        shell: pwsh
        run: ./scripts/build-msix.ps1 -SkipBuild
      - name: Upload Windows build
        uses: actions/upload-artifact@v7
        with:
          name: rubrica-associati-windows-x64
          path: rubrica-associati-windows-x64.zip
          if-no-files-found: error
      - name: Upload Microsoft Store package
        uses: actions/upload-artifact@v7
        with:
          name: rubrica-associati-windows-msix
          path: build/windows/**/*.msix
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev imagemagick
      - name: Install dependencies
        run: flutter pub get
      - name: Test on Linux
        run: flutter test
      - name: Build Linux
        run: flutter build linux --release
      - name: Create Linux packages
        run: ./scripts/build-linux-packages.sh
      - name: Upload Linux packages
        uses: actions/upload-artifact@v7
        with:
          name: rubrica-associati-linux-x64
          path: build/linux/packages/*
          if-no-files-found: error
